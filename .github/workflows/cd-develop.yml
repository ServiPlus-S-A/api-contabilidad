# ==============================================================================
# CD — develop (Entorno de desarrollo / staging)
# Corre en cada push a develop (merge de PR).
#
# Despliega en el mismo EC2 que producción pero completamente aislado:
#   - Proyecto Docker: contabilidad-dev (volúmenes y red separados)
#   - Base de datos:   contabilidad_dev
#   - Kong port:       8100 (prod usa 8000)
#   - Image tag:       :develop (prod usa :latest)
#
# Secrets requeridos (además de los de cd-main.yml):
#   VITE_API_BASE_URL_DEV  → http://<EC2_IP>:8100
#
# Setup único en EC2 (una sola vez):
#   cp .env.dev.example /home/ubuntu/api-contabilidad/.env.dev
#   # editar .env.dev con contraseñas reales de dev
#
# EC2 Security Group: abrir el puerto 8100 (TCP inbound) para acceder al dev.
# ==============================================================================

name: CD — develop

on:
  push:
    branches: [develop]

concurrency:
  group: cd-develop
  cancel-in-progress: false

jobs:

  # ────────────────────────────────────────────────────────────────────────────
  # Backend — JAR + imagen Docker con tag :develop
  # ────────────────────────────────────────────────────────────────────────────
  build-backend:
    name: Build + push backend (develop)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25 (Temurin)
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'

      - name: Ensure mvnw is executable
        working-directory: backend
        run: chmod +x mvnw

      - name: Build JAR (tests ran in pr-develop pipeline)
        working-directory: backend
        run: |
          ./mvnw package -DskipTests -B -q \
            -Dorg.slf4j.simpleLogger.log.org.apache.maven.cli.transfer.Slf4jMavenTransferListener=warn

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend image (develop tag)
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/api-contabilidad-backend:develop
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ────────────────────────────────────────────────────────────────────────────
  # Frontend — imagen Docker con tag :develop, apunta al Kong dev (puerto 8100)
  # ────────────────────────────────────────────────────────────────────────────
  build-frontend:
    name: Build + push frontend (develop)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push frontend image (develop tag)
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          build-args: |
            VITE_API_BASE_URL=${{ secrets.VITE_API_BASE_URL_DEV }}
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/api-contabilidad-frontend:develop
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ────────────────────────────────────────────────────────────────────────────
  # Deploy — actualiza el stack contabilidad-dev en EC2
  # ────────────────────────────────────────────────────────────────────────────
  deploy-dev:
    name: Deploy to EC2 (dev)
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Copy compose files and Kong config to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.yml,docker-compose.dev.yml,kong/"
          target: "/home/ubuntu/api-contabilidad-dev"

      - name: Pull images and restart dev stack
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 30m
          script: |
            export DOCKERHUB_USERNAME="${{ secrets.DOCKERHUB_USERNAME }}"
            mkdir -p /home/ubuntu/api-contabilidad-dev/kong
            cd /home/ubuntu/api-contabilidad-dev
            docker-compose -p contabilidad-dev \
              -f docker-compose.yml \
              -f docker-compose.dev.yml \
              --env-file .env.dev \
              pull
            docker-compose -p contabilidad-dev \
              -f docker-compose.yml \
              -f docker-compose.dev.yml \
              --env-file .env.dev \
              up -d --remove-orphans
            docker image prune -f
            echo "Dev deploy complete — branch develop @ ${{ github.sha }}"
