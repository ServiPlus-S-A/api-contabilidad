# ==============================================================================
# Code Quality — PR → develop
# Corre en paralelo con pr-develop.yml en cada PR hacia develop.
#
# Jobs:
#   commit-lint — valida que cada commit del PR cumpla la convención:
#                 tipo permitido + descripción ≤ 72 chars en español
#   sonar       — análisis estático + quality gate en SonarCloud
#
# Tipos permitidos: feat | fix | refactor | chore | test | docs | style
#
# Secrets requeridos (Settings → Secrets and variables → Actions):
#   SONAR_TOKEN        — token de autenticación de SonarCloud
#   SONAR_ORGANIZATION — organization key en sonarcloud.io  (ej: serviplus-s-a)
#   SONAR_PROJECT_KEY  — project key en sonarcloud.io       (ej: ServiPlus-S-A_api-contabilidad)
# ==============================================================================

name: Code Quality — PR → develop

on:
  pull_request:
    branches: [develop]
  push:
    branches: [develop]

concurrency:
  group: quality-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # Commit lint — solo corre en PRs, no en push directo a develop
  # fetch-depth: 0 requerido para leer el historial completo del PR
  # ────────────────────────────────────────────────────────────────────────────
  commit-lint:
    if: github.event_name == 'pull_request'
    name: Commit lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

        with:
          fetch-depth: 0

      - name: Validate commit messages
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          ERRORS=0
          TYPES="feat|fix|refactor|chore|test|docs|style"
          while IFS= read -r subject; do
            [ -z "$subject" ] && continue
            # Skip merge commits generated by GitHub
            echo "$subject" | grep -qE '^Merge ' && continue

            len=${#subject}
            if [ "$len" -gt 72 ]; then
              echo "::error::Commit supera los 72 caracteres ($len): $subject"
              ERRORS=$((ERRORS + 1))
            fi
            if ! echo "$subject" | grep -qE "^($TYPES)(\(.+\))?: .+"; then
              echo "::error::Formato inválido: $subject"
              echo "::error::Esperado  →  tipo(scope)?: descripción en español"
              echo "::error::Tipos permitidos: $TYPES"
              ERRORS=$((ERRORS + 1))
            fi
          done <<< "$(git log --format='%s' "$BASE_SHA"..HEAD)"

          if [ "$ERRORS" -gt 0 ]; then
            echo "Se encontraron $ERRORS error(es) en los mensajes de commit."
            exit 1
          fi
          echo "Todos los mensajes de commit son válidos."

  # ────────────────────────────────────────────────────────────────────────────
  # SonarCloud — análisis estático + quality gate
  # Corre en paralelo con commit-lint; no depende del backend-checks de pr-develop.
  # fetch-depth: 0 necesario para que Sonar vea el historial completo del PR
  # y calcule correctamente el código nuevo vs código existente.
  # ────────────────────────────────────────────────────────────────────────────
  sonar:
    name: SonarCloud — quality gate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Set up JDK 25 (Temurin)
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'

      - name: Ensure mvnw is executable
        run: chmod +x mvnw

      - name: Run tests + SonarCloud analysis
        env:
          SONAR_ORGANIZATION: ${{ secrets.SONAR_ORGANIZATION }}
          SONAR_PROJECT_KEY: ${{ secrets.SONAR_PROJECT_KEY }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_BRANCH: ${{ github.head_ref }}
          PR_BASE: ${{ github.base_ref }}
          PR_REPO: ${{ github.repository }}
          JWT_SECRET: test-secret-minimum-32-chars-for-hmac
          MINIO_ENDPOINT: http://localhost:9000
          MINIO_ACCESS_KEY: test
          MINIO_SECRET_KEY: test
          MINIO_BUCKET: test-bucket
          EMAIL_FROM: ci@test.com
          SMTP_HOST: localhost
          SMTP_PORT: 25
          CORS_ALLOWED_ORIGINS: http://localhost:5173
        run: |
          # Parámetros de PR solo cuando el evento es pull_request
          PR_PARAMS=""
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            PR_PARAMS="-Dsonar.pullrequest.key=$PR_NUMBER \
              -Dsonar.pullrequest.branch=$PR_BRANCH \
              -Dsonar.pullrequest.base=$PR_BASE \
              -Dsonar.pullrequest.github.repository=$PR_REPO"
          fi

          ./mvnw verify sonar:sonar -B \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.organization="$SONAR_ORGANIZATION" \
            -Dsonar.projectKey="$SONAR_PROJECT_KEY" \
            -Dsonar.token="$SONAR_TOKEN" \
            -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml \
            $PR_PARAMS \
            -Dorg.slf4j.simpleLogger.log.org.apache.maven.cli.transfer.Slf4jMavenTransferListener=warn
