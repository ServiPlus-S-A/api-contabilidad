# ==============================================================================
# Code Quality — PR → develop
# Corre en paralelo con pr-develop.yml en cada PR hacia develop.
#
# Jobs:
#   commit-lint     — valida que cada commit del PR cumpla la convención:
#                     tipo permitido + descripción ≤ 72 chars
#   backend-spotbugs — SpotBugs analiza bytecode (HIGH priority rompe el build)
#
# Tipos permitidos: feat | fix | refactor | chore | test | docs | style
# Umbral SpotBugs:  editar backend/pom.xml → spotbugs-maven-plugin → threshold
# ==============================================================================

name: Code Quality — PR → develop

on:
  pull_request:
    branches: [develop]

concurrency:
  group: quality-${{ github.head_ref }}
  cancel-in-progress: true

jobs:

  # ────────────────────────────────────────────────────────────────────────────
  # Commit lint — valida TODOS los commits del PR contra .commitlintrc.yml
  # fetch-depth: 0 requerido para que el action pueda leer el historial completo
  # ────────────────────────────────────────────────────────────────────────────
  commit-lint:
    name: Commit lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate commit messages
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          ERRORS=0
          TYPES="feat|fix|refactor|chore|test|docs|style"
          while IFS= read -r subject; do
            [ -z "$subject" ] && continue
            # Skip merge commits generated by GitHub
            echo "$subject" | grep -qE '^Merge ' && continue

            len=${#subject}
            if [ "$len" -gt 72 ]; then
              echo "::error::Commit exceeds 72 chars ($len): $subject"
              ERRORS=$((ERRORS + 1))
            fi
            if ! echo "$subject" | grep -qE "^($TYPES)(\(.+\))?: .+"; then
              echo "::error::Invalid format: $subject"
              echo "::error::Expected  →  type(scope)?: description"
              echo "::error::Allowed types: $TYPES"
              ERRORS=$((ERRORS + 1))
            fi
          done <<< "$(git log --format='%s' "$BASE_SHA"..HEAD)"

          if [ "$ERRORS" -gt 0 ]; then
            echo "Found $ERRORS commit message violation(s)."
            exit 1
          fi
          echo "All commit messages are valid."

  # ────────────────────────────────────────────────────────────────────────────
  # SpotBugs — analiza bytecode compilado en busca de bugs potenciales
  # No requiere variables de entorno: solo compila y analiza, no arranca la app
  # ────────────────────────────────────────────────────────────────────────────
  backend-spotbugs:
    name: Backend — SpotBugs static analysis
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25 (Temurin)
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'

      - name: Ensure mvnw is executable
        run: chmod +x mvnw

      - name: Compile + SpotBugs analysis
        run: |
          ./mvnw compile spotbugs:check -B \
            -Dorg.slf4j.simpleLogger.log.org.apache.maven.cli.transfer.Slf4jMavenTransferListener=warn

      - name: Upload SpotBugs report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: spotbugs-report
          path: backend/target/spotbugsXml.xml
          retention-days: 7
