# ==============================================================================
# CI — runs on every push and PR to any branch
# Scope: FAST checks only (no Docker containers, no E2E)
#   - Backend: compile + unit tests (*Test.java) + JaCoCo report
#   - Frontend: type-check (tsc) + ESLint + Vitest unit tests + production build
# ==============================================================================

name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

# Cancel in-progress runs on the same branch to save free-plan minutes
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ────────────────────────────────────────────────────────────────────────────
  # Backend — unit tests only (*Test.java); *IT.java is excluded by surefire
  # No service containers needed — all deps are mocked with Mockito
  # ────────────────────────────────────────────────────────────────────────────
  backend-unit:
    name: Backend — unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25 (Temurin)
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'

      - name: Ensure mvnw is executable
        run: chmod +x mvnw

      - name: Run unit tests
        run: ./mvnw test -B -Dorg.slf4j.simpleLogger.log.org.apache.maven.cli.transfer.Slf4jMavenTransferListener=warn

      - name: Upload JaCoCo HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-unit-report
          path: backend/target/site/jacoco/
          retention-days: 7

  # ────────────────────────────────────────────────────────────────────────────
  # Frontend — TypeScript + lint + Vitest + production build
  # NOTE: commit frontend/package-lock.json (run `npm install` locally first).
  # Until then, the install step falls back to `npm install` automatically.
  # ────────────────────────────────────────────────────────────────────────────
  frontend:
    name: Frontend — type-check, lint, tests, build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20 LTS
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache npm store
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json', 'frontend/package.json') }}
          restore-keys: npm-${{ runner.os }}-

      - name: Install dependencies
        # `npm ci` requires package-lock.json to be committed.
        # Falls back to `npm install` until the lock file exists in the repo.
        run: |
          if [ -f package-lock.json ]; then
            echo "✅ Lock file found — reproducible install with npm ci"
            npm ci
          else
            echo "⚠️  No package-lock.json committed. Run 'npm install' locally and commit it!"
            npm install
          fi

      - name: TypeScript strict type-check
        run: npm run type-check

      - name: ESLint
        run: npm run lint

      - name: Vitest unit tests with coverage
        run: npm run test:coverage

      - name: Upload Vitest coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: vitest-coverage
          path: frontend/coverage/
          retention-days: 7

      - name: Production build (tsc + vite)
        run: npm run build
