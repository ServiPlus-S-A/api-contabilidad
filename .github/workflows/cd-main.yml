# ==============================================================================
# CD — main (Despliegue Continuo)
# Corre cuando una PR de develop se fusiona a main (push a main).
#
# Estrategia: Docker Hub → EC2 (Estrategia 3 de la guía académica)
#   1. build-backend  — compila JAR, construye imagen, sube a Docker Hub
#   2. build-frontend — construye imagen Nginx, sube a Docker Hub
#   3. deploy         — copia compose files a EC2, pull + restart via SSH
#
# Secrets requeridos (Settings → Secrets and variables → Actions → Secrets):
#   DOCKERHUB_USERNAME  — usuario de Docker Hub
#   DOCKERHUB_TOKEN     — access token de Docker Hub (NO la contraseña)
#   EC2_HOST            — IP pública de la instancia EC2
#   EC2_USER            — usuario SSH (por defecto: ubuntu)
#   EC2_SSH_KEY         — contenido del archivo .pem (llave privada completa)
#   VITE_API_BASE_URL   — URL del Kong gateway para el frontend en producción
#                         ej. http://<EC2_HOST>:8000
#
# Preparación única en EC2 (manual, una sola vez):
#   mkdir -p /home/ubuntu/api-contabilidad/kong
#   # Copiar .env con valores de producción a /home/ubuntu/api-contabilidad/.env
#   sudo apt install docker.io docker-compose-plugin -y
#   sudo usermod -aG docker ubuntu   # y reconectar SSH
# ==============================================================================

name: CD — main

on:
  push:
    branches: [main]

concurrency:
  group: cd-main
  cancel-in-progress: false

jobs:

  # ────────────────────────────────────────────────────────────────────────────
  # Backend — compila el JAR con Maven, construye imagen multi-stage y la sube
  # ────────────────────────────────────────────────────────────────────────────
  build-backend:
    name: Build + push backend image
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25 (Temurin)
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'

      - name: Ensure mvnw is executable
        working-directory: backend
        run: chmod +x mvnw

      - name: Build JAR (tests ran in pr-develop pipeline)
        working-directory: backend
        run: |
          ./mvnw package -DskipTests -B -q \
            -Dorg.slf4j.simpleLogger.log.org.apache.maven.cli.transfer.Slf4jMavenTransferListener=warn

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/api-contabilidad-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/api-contabilidad-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ────────────────────────────────────────────────────────────────────────────
  # Frontend — construye imagen multi-stage (Node build + Nginx serve) y la sube
  # ────────────────────────────────────────────────────────────────────────────
  build-frontend:
    name: Build + push frontend image
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          build-args: |
            VITE_API_BASE_URL=${{ secrets.VITE_API_BASE_URL }}
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/api-contabilidad-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/api-contabilidad-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ────────────────────────────────────────────────────────────────────────────
  # Deploy — copia los compose files al servidor y reinicia los servicios
  # Usa las imágenes recién subidas a Docker Hub vía docker-compose.prod.yml
  # ────────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Copy compose files and Kong config to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.yml,docker-compose.prod.yml,kong/"
          target: "/home/ubuntu/api-contabilidad"

      - name: Pull images and restart services
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            export DOCKERHUB_USERNAME="${{ secrets.DOCKERHUB_USERNAME }}"
            export IMAGE_TAG="${{ github.sha }}"
            cd /home/ubuntu/api-contabilidad
            docker compose -f docker-compose.yml -f docker-compose.prod.yml pull
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --remove-orphans
            docker image prune -f
            echo "Deploy completado — commit $IMAGE_TAG"
