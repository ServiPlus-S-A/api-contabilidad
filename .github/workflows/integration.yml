# ==============================================================================
# Integration — runs on push to main and on PRs targeting main
# Scope: SLOW checks (containers, real DB, E2E browser tests)
#   - Backend: mvn verify = unit tests + *IT.java (Testcontainers MariaDB)
#     + JaCoCo coverage gate enforcement (80% logic + serializer layers)
#   - Frontend E2E: Playwright Chromium — API is mocked via page.route(),
#     so no backend service is required for this job
# ==============================================================================

name: Integration

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: integration-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ────────────────────────────────────────────────────────────────────────────
  # Backend integration tests
  # Testcontainers starts MariaDB 11.4 via Docker (available on ubuntu-latest).
  # No manual service containers needed — Testcontainers handles lifecycle.
  # ────────────────────────────────────────────────────────────────────────────
  backend-integration:
    name: Backend — integration tests + coverage gate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25 (Temurin)
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'

      - name: Ensure mvnw is executable
        run: chmod +x mvnw

      - name: Run unit + integration tests and enforce coverage gate
        run: |
          ./mvnw verify -B \
            -Dorg.slf4j.simpleLogger.log.org.apache.maven.cli.transfer.Slf4jMavenTransferListener=warn
        env:
          # Failsafe/Surefire use test profile; Testcontainers manages DB itself.
          # These env vars satisfy application.properties defaults for non-DB beans.
          JWT_SECRET: ${{ secrets.JWT_SECRET || 'test-secret-minimum-32-chars-for-hmac' }}
          MINIO_ENDPOINT: http://localhost:9000
          MINIO_ACCESS_KEY: test
          MINIO_SECRET_KEY: test
          MINIO_BUCKET: test-bucket
          EMAIL_FROM: ci@test.com
          SMTP_HOST: localhost
          SMTP_PORT: 25
          CORS_ALLOWED_ORIGINS: http://localhost:5173

      - name: Upload failsafe report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: failsafe-report
          path: backend/target/failsafe-reports/
          retention-days: 14

      - name: Upload JaCoCo full report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-full-report
          path: backend/target/site/jacoco/
          retention-days: 14

  # ────────────────────────────────────────────────────────────────────────────
  # Frontend E2E — Playwright Chromium
  # API calls are intercepted with page.route() — NO backend required.
  # Playwright starts the Vite dev server automatically (webServer config).
  # ────────────────────────────────────────────────────────────────────────────
  frontend-e2e:
    name: Frontend — Playwright E2E
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20 LTS
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache npm store
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json', 'frontend/package.json') }}
          restore-keys: npm-${{ runner.os }}-

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            echo "⚠️  No package-lock.json committed. Run 'npm install' locally and commit it!"
            npm install
          fi

      - name: Cache Playwright browser binaries
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json', 'frontend/package.json') }}

      - name: Install Playwright Chromium (skip if cached)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium --with-deps

      - name: Install Chromium system deps (always — even when browser is cached)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          CI: 'true'

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 14
