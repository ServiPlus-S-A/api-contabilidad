spring.application.name=api-contabilidad

# ==============================================================================
# DataSource — MariaDB 11.4
# ==============================================================================
spring.datasource.url=jdbc:mariadb://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:contabilidad}?useUnicode=true&characterEncoding=UTF-8&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USER:contabilidad}
spring.datasource.password=${DB_PASSWORD:contabilidad}
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
spring.datasource.hikari.maximum-pool-size=${DB_POOL_SIZE:10}
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000

# ==============================================================================
# JPA / Hibernate
# ==============================================================================
spring.jpa.database-platform=org.hibernate.dialect.MariaDBDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ==============================================================================
# Flyway
# ==============================================================================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=false

# ==============================================================================
# Server
# ==============================================================================
server.port=${SERVER_PORT:8080}

# ==============================================================================
# Actuator — health check exposed at /actuator/health (used by docker-compose)
# ==============================================================================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# ==============================================================================
# Redis — Async Layer
# ==============================================================================
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.connect-timeout=2000ms

# ==============================================================================
# Mail
# ==============================================================================
spring.mail.host=${SMTP_HOST:smtp.example.com}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USER:noreply@example.com}
spring.mail.password=${SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ==============================================================================
# OpenAPI / Swagger UI
# ==============================================================================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# ==============================================================================
# Application-specific properties (see AppProperties.java)
# ==============================================================================
app.jwt.secret=${JWT_SECRET:change-me-in-production-minimum-256-bits-xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx}
app.jwt.expiration=${JWT_EXPIRATION:86400000}
app.iva.rate=0.13
app.minio.endpoint=${MINIO_ENDPOINT:http://localhost:9000}
app.minio.access-key=${MINIO_ACCESS_KEY:minioadmin}
app.minio.secret-key=${MINIO_SECRET_KEY:minioadmin}
app.minio.bucket=${MINIO_BUCKET:contabilidad-pdfs}
app.email.from=${EMAIL_FROM:noreply@serviplus.com}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:8000}
app.public-url=${APP_PUBLIC_URL:http://localhost:8000}

# ==============================================================================
# Logging
# ==============================================================================
logging.level.root=${LOG_LEVEL:INFO}
logging.level.com.serviplus.apicontabilidad=DEBUG
logging.level.org.springframework.security=WARN
logging.pattern.console=%d{HH:mm:ss} %-5level [%thread] %logger{36} - %msg%n
