# ==============================================================================
# Test profile — overrides application.properties for integration tests.
# DB URL/credentials are further overridden by @DynamicPropertySource
# in AbstractContainerIT (Testcontainers provides the real values at runtime).
# ==============================================================================

# Disable Redis auto-configuration (not used in app logic; avoids connection errors)
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

# Disable Spring Session (stateless API; not needed in tests)
spring.session.store-type=none

# Shared JWT secret — must match JwtTestHelper.TEST_SECRET
app.jwt.secret=test-secret-minimum-32-chars-for-hmac

# IVA rate
app.iva.rate=0.13

# MinIO — mocked with @MockBean in tests
app.minio.endpoint=http://localhost:9000
app.minio.access-key=test
app.minio.secret-key=test
app.minio.bucket=test-bucket

# Mail — mocked with @MockBean in tests
app.email.from=test@test.com
app.cors.allowed-origins=http://localhost:5173
spring.mail.host=localhost
spring.mail.port=25
# Disable mail health contributor — Spring Boot 4.x throws 'beans must not be empty'
# when MailHealthContributorAutoConfiguration activates but no JavaMailSenderImpl bean exists
management.health.mail.enabled=false

# Verbose SQL for test output
spring.jpa.show-sql=true
logging.level.org.springframework.web=DEBUG
