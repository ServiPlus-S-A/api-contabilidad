_format_version: "3.0"
_transform: true

# ==============================================================================
# Kong Gateway 3.8 — DB-less config for DEV / staging environment
# Identical to kong.yml but adds the dev proxy origin (:8100) to CORS.
# Mounted via docker-compose.dev.yml override.
# ==============================================================================

services:

  - name: backend-service
    url: http://backend:8080
    connect_timeout: 10000
    read_timeout: 60000
    write_timeout: 60000
    routes:
      - name: api-route
        paths:
          - /api/v1
        strip_path: false
        methods:
          - GET
          - POST
          - PUT
          - DELETE
          - OPTIONS
        preserve_host: false
      - name: swagger-route
        paths:
          - /swagger-ui
          - /v3/api-docs
        strip_path: false
        methods:
          - GET
          - OPTIONS
        preserve_host: false
    plugins:
      - name: cors
        config:
          origins:
            - "http://localhost:5173"
            - "http://localhost:8100"
            - "http://$(PUBLIC_HOST):8100"
          methods:
            - GET
            - POST
            - PUT
            - DELETE
            - OPTIONS
          headers:
            - Content-Type
            - Authorization
            - Accept
          exposed_headers:
            - Authorization
          credentials: true
          max_age: 3600
      - name: rate-limiting
        config:
          minute: 120
          policy: local
          error_message: "Demasiadas solicitudes — intente en un momento"
      - name: request-termination
        enabled: false

  - name: frontend-service
    url: http://frontend:8080
    connect_timeout: 5000
    read_timeout: 30000
    write_timeout: 30000
    routes:
      - name: frontend-route
        paths:
          - /
        strip_path: false
        methods:
          - GET
          - OPTIONS
