_format_version: "3.0"
_transform: true

# ==============================================================================
# Kong Gateway 3.8 — DB-less declarative configuration (ADR-S1, ADR-M1)
#
# Security strategy:
#   Kong layer  → CORS, Rate Limiting, request logging
#   Backend layer → JWT validation, RBAC (Spring Security)
#
# Production note: add the JWT plugin here with pre-seeded consumers to add
# a second validation layer. Example at end of file (commented out).
# ==============================================================================

services:

  # ============================================================================
  # Backend — Spring Boot 4.0 on port 8080
  # ============================================================================
  - name: backend-service
    url: http://backend:8080
    connect_timeout: 10000
    read_timeout: 60000
    write_timeout: 60000
    routes:
      - name: api-route
        paths:
          - /api/v1
        strip_path: false
        methods:
          - GET
          - POST
          - PUT
          - DELETE
          - OPTIONS
        preserve_host: false
      - name: swagger-route
        paths:
          - /swagger-ui
          - /v3/api-docs
        strip_path: false
        methods:
          - GET
          - OPTIONS
        preserve_host: false
    plugins:
      - name: cors
        config:
          origins:
            - "http://localhost:5173"
            - "http://localhost:8000"
            - "http://$(PUBLIC_HOST)"
            - "http://$(PUBLIC_HOST):8000"
          methods:
            - GET
            - POST
            - PUT
            - DELETE
            - OPTIONS
          headers:
            - Content-Type
            - Authorization
            - Accept
          exposed_headers:
            - Authorization
          credentials: false
          max_age: 3600
      - name: rate-limiting
        config:
          minute: 300
          policy: local
          error_message: "Demasiadas solicitudes — intente en un momento"

  # ============================================================================
  # Frontend — Nginx on port 80
  # ============================================================================
  - name: frontend-service
    url: http://frontend:8080
    connect_timeout: 5000
    read_timeout: 30000
    write_timeout: 30000
    routes:
      - name: frontend-route
        paths:
          - /
        strip_path: false
        methods:
          - GET
          - OPTIONS

# ==============================================================================
# Production JWT plugin example (uncomment and configure when auth service
# is integrated — requires consumer records with jwt_secrets):
#
# consumers:
#   - username: serviplus-system
#     jwt_secrets:
#       - key: serviplus-issuer
#         secret: <SAME_VALUE_AS_JWT_SECRET_ENV_VAR>
#         algorithm: HS256
#
# Then add to api-route plugins:
#   - name: jwt
#     config:
#       claims_to_verify:
#         - exp
#       key_claim_name: iss
# ==============================================================================
