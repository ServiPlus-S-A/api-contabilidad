# =============================================================================
# api-contabilidad — Docker Compose (ADR-S1)
# Architecture: Kong Gateway → Frontend / Backend → MariaDB + Redis + MinIO
# Run: docker compose up --build
# =============================================================================

networks:
  contabilidad-net:
    driver: bridge

volumes:
  mariadb-data:
    driver: local
  redis-data:
    driver: local
  minio-data:
    driver: local

services:

  # ---------------------------------------------------------------------------
  # MariaDB 11.4 LTS — Primary persistence (ADR-M1: Data Layer)
  # ---------------------------------------------------------------------------
  mariadb:
    image: mariadb:11.4
    container_name: contabilidad-mariadb
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MARIADB_DATABASE: ${DB_NAME}
      MARIADB_USER: ${DB_USER}
      MARIADB_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mariadb-data:/var/lib/mysql
    networks:
      - contabilidad-net
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    expose:
      - "3306"

  # ---------------------------------------------------------------------------
  # Redis 7.4 — Async Layer message bus (ADR-M3: Async Layer)
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7.4-alpine
    container_name: contabilidad-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --save 60 1
      --loglevel warning
    volumes:
      - redis-data:/data
    networks:
      - contabilidad-net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    expose:
      - "6379"

  # ---------------------------------------------------------------------------
  # MinIO — Object storage for generated PDFs (Bucket in SAD diagram)
  # ---------------------------------------------------------------------------
  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    container_name: contabilidad-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - minio-data:/data
    networks:
      - contabilidad-net
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    expose:
      - "9000"
      - "9001"

  # ---------------------------------------------------------------------------
  # Backend — Spring Boot 3.3 (ADR-M1, ADR-M2, ADR-M3)
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: contabilidad-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_HOST: mariadb
      DB_PORT: 3306
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MINIO_ENDPOINT: http://minio:9000
      JAVA_TOOL_OPTIONS: "-Xmx256m -Xms128m"
      MANAGEMENT_HEALTH_MAIL_ENABLED: "false"
    mem_limit: 400m
    networks:
      - contabilidad-net
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s
    expose:
      - "8080"

  # ---------------------------------------------------------------------------
  # Frontend — React 18 / Vite served via Nginx
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
    container_name: contabilidad-frontend
    restart: unless-stopped
    networks:
      - contabilidad-net
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
    expose:
      - "8080"

  # ---------------------------------------------------------------------------
  # Kong Gateway 3.8 — DB-less mode (ADR-M1 API Gateway: JWT, RBAC, CORS,
  #                                   Rate Limiting, Logger)
  # ---------------------------------------------------------------------------
  kong:
    image: kong:3.8
    container_name: contabilidad-kong
    restart: unless-stopped
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /etc/kong/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: "0.0.0.0:8001"
      KONG_PROXY_LISTEN: "0.0.0.0:8000"
    volumes:
      - ./kong/kong.yml:/etc/kong/kong.yml:ro
    networks:
      - contabilidad-net
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    ports:
      - "${KONG_PROXY_PORT:-8000}:8000"
      - "${KONG_ADMIN_PORT:-8001}:8001"
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
